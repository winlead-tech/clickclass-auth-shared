name: Publish Gradle Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão do pacote (ex: 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  publish-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Resolver versão
        id: resolve_version
        run: |
          VERSION="${{ github.event.release.tag_name || inputs.version }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Usando versão: $VERSION"

      - name: Build e testes
        run: ./gradlew build --no-daemon

      - name: Publish to GitHub Packages
        run: ./gradlew publish -Pversion=${{ steps.resolve_version.outputs.version }} --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}